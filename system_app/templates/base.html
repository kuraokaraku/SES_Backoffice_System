<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}業務システム{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        /* メニュー内リンクのホバー演出 */
        .nav-link:hover {
            background-color: #495057;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand me-auto ms-3" href="{% url 'menu' %}">業務効率化システム</a>
            <form action="{% url 'logout' %}" method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">ログアウト</button>
        </form>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar" aria-labelledby="offcanvasDarkNavbarLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">メニュー</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'menu' %}"><i class="bi bi-house-door me-2"></i>ホーム</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'freelancer_list' %}"><i class="bi bi-person me-2"></i>ユーザー管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'freelancer_list' %}"><i class="bi bi-person me-2"></i>個人事業主一覧</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'partner_list' %}"><i class="bi bi-building me-2"></i>提携パートナー一覧</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'monthly_list' %}"><i class="bi bi-building me-2"></i>月毎の作業管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'purchase_order_list' %}"><i class="bi bi-archive me-2"></i>注文書アーカイブ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'business_card_list' %}">
                        <i class="bi bi-person-badge me-2"></i>名刺管理
                    </a>
                </li>
                <hr>
                <!--<li class="nav-item">
                    <a class="nav-link text-info" href="/admin/"><i class="bi bi-gear me-2"></i>管理者画面</a>
                </li>-->
            </ul>
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center mt-5 py-3 text-muted">
        &copy; 2025 業務効率化プロジェクト
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Bootstrapのツールチップを有効化
        document.addEventListener('DOMContentLoaded', function () {
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl)
            })
        });
    </script>
</body>
</html>
