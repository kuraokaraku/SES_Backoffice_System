<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}都システム{% endblock %}</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">

    <style>
        /* ── Sidebar ── */
        .app-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 240px;
            background: #1e293b;
            color: #cbd5e1;
            display: flex;
            flex-direction: column;
            z-index: 1030;
        }
        .app-sidebar .brand {
            padding: 1.25rem 1.25rem 1rem;
            font-size: 1.5rem;
            font-weight: 900;
            color: #f8fafc;
            letter-spacing: .08em;
            border-bottom: 1px solid #334155;
            font-family: "Noto Serif JP", "Yu Mincho", "游明朝", serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,.4);
        }
        .app-sidebar nav {
            padding: .75rem 0;
        }
        .app-sidebar .sidebar-logo {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 1.5rem;
        }
        .app-sidebar .sidebar-logo img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(1) brightness(.25);
            mix-blend-mode: screen;
        }
        .app-sidebar .nav-link {
            display: flex;
            align-items: center;
            padding: .6rem 1.25rem;
            color: #94a3b8;
            font-size: .875rem;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: background .15s, color .15s;
        }
        .app-sidebar .nav-link:hover {
            background: #334155;
            color: #e2e8f0;
        }
        .app-sidebar .nav-link.active {
            background: #334155;
            color: #f8fafc;
            font-weight: 600;
            border-left-color: #3b82f6;
        }
        .app-sidebar .nav-link i {
            width: 1.5rem;
            text-align: center;
            margin-right: .5rem;
            font-size: 1rem;
        }
        .app-sidebar .sidebar-footer {
            padding: .75rem 1.25rem;
            border-top: 1px solid #334155;
            font-size: .8rem;
        }

        /* ── Main area ── */
        .app-main {
            margin-left: 240px;
            min-height: 100vh;
            background: #f8fafc;
        }
        .app-topbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: .5rem 1.5rem;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }
        .app-content {
            padding: 1.5rem 2rem;
        }

        /* 既存テンプレ内の .container を幅制限なしに */
        .app-content > .container,
        .app-content > .container-fluid {
            max-width: 100%;
            padding-left: 0;
            padding-right: 0;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="app-sidebar">
        <div class="brand">都システム</div>
        <nav>
            <a class="nav-link {% if '/timesheets/' in request.path %}active{% endif %}"
               href="{% url 'timesheet_dashboard' %}">
                <i class="bi bi-file-earmark-spreadsheet"></i>勤務表回収
            </a>
            <a class="nav-link {% if '/invoices/' in request.path %}active{% endif %}"
               href="{% url 'invoice_list' %}">
                <i class="bi bi-receipt"></i>請求書
            </a>
            <a class="nav-link {% if '/party/' in request.path or '/assignment/' in request.path %}active{% endif %}"
               href="{% url 'party_list' %}">
                <i class="bi bi-briefcase"></i>契約管理
            </a>
        </nav>
        <div class="sidebar-logo">
            <img src="{% static 'img/logo.png' %}" alt="Miya-Co">
        </div>
        <div class="sidebar-footer text-muted">
            {% if user.is_authenticated %}{{ user.username }}{% endif %}
        </div>
    </aside>

    <!-- Main -->
    <div class="app-main">
        <div class="app-topbar">
            {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-secondary btn-sm">ログアウト</button>
            </form>
            {% endif %}
        </div>

        <div class="app-content">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            tooltipTriggerList.map(function (el) { return new bootstrap.Tooltip(el) })
        });
    </script>
</body>
</html>
