{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-primary" style="max-width: 500px; margin: auto;">
        <div class="card-header bg-primary text-white">ユーザー編集</div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">ユーザー名</label>
                    {{ form.username }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ form.new_password.label }}</label>
                    {{ form.new_password }}
                </div>

                {% if form.is_active %}
                <div class="form-check form-switch mb-3">
                    {{ form.is_active }}
                    <label class="form-check-label">有効状態</label>
                </div>
                {% endif %}

                <div class="mt-4 text-center">
                    <a href="{% url 'user_list' %}" class="btn btn-secondary me-2">戻る</a>
                    <button type="submit" class="btn btn-primary px-4">更新</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
