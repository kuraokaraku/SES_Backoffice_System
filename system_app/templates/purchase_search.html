{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="bi bi-search me-2"></i>注文書メールを検索して取り込む</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">クライアント名（選択または直接入力）</label>
                        <input type="text" name="client_name" list="client-options" class="form-control" placeholder="会社名または氏名を入力..." required>
                        
                        <datalist id="client-options">
                            {% for partner in partners %}
                                <option value="{{ partner.name }}">提携パートナー</option>
                            {% endfor %}
                            {% for freelancer in freelancers %}
                                <option value="{{ freelancer.name }}">個人事業主</option>
                            {% endfor %}
                        </datalist>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">開始日</label>
                        <input type="date" class="form-control" name="start_date">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">終了日</label>
                        <input type="date" class="form-control" name="end_date">
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <a href="{% url 'purchase_order_list' %}" class="btn btn-secondary me-2">キャンセル</a>
                    <button type="submit" class="btn btn-primary px-5">メールを検索する</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
