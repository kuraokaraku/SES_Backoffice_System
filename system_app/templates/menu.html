{% extends "base.html" %} {% block content %}

<div
  class="container"
  style="
    min-height: calc(100vh - 220px);
    display: grid;
    grid-template-rows: 1fr auto 1fr auto 2fr;
  "
>
  <div></div>

  <h2 class="mb-0 text-center">メインメニュー</h2>

  <div></div>

  <div class="row g-4">
    <div class="col-md-4">
      <div class="card h-100 shadow-sm border-success">
        <div class="card-body text-center">
          <i class="bi bi-person-lines-fill display-4 text-success"></i>
          <h5 class="card-title mt-3">人材管理</h5>
          <p class="card-text text-muted small">
            個人事業主・ビジネスパートナーの情報を管理します。
          </p>
          <a href="{% url 'party_list' %}" class="btn btn-success w-100 mt-2"
            >開く</a
          >
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm border-warning">
        <div class="card-body text-center">
          <i class="bi bi-calendar3 display-4 text-warning"></i>
          <h5 class="card-title mt-3">月毎の作業管理</h5>
          <p class="card-text text-muted small">
            事務作業の進捗状況や月次の実績を表示します。
          </p>
          <a
            href="{% url 'monthly_list' %}"
            class="btn btn-warning text-white w-100 mt-2"
            >開く</a
          >
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm border-info">
        <div class="card-body text-center">
          <i class="bi bi-archive-fill display-4 text-info"></i>
          <h5 class="card-title mt-3">注文書アーカイブ</h5>
          <p class="card-text text-muted small">
            Xサーバーのメールから注文書PDFを取得・保存します。
          </p>
          <a
            href="{% url 'purchase_order_list' %}"
            class="btn btn-info text-white w-100 mt-2"
            >開く</a
          >
        </div>
      </div>
    </div>
  </div>

  <div></div>
</div>

{% endblock %}
